name: Build APK
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt update
          # Добавляем libtool, m4, autoconf и другие важные штуки для компиляции libffi
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf automake libtool m4 gettext pkg-config zlib1g-dev libncurses6 libncursesw6 libtinfo6 cmake libffi-dev libssl-dev
          pip3 install --user --upgrade buildozer "cython<3.0" virtualenv

      - name: Build APK with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Чистим старые попытки сборки, чтобы не было конфликтов
          rm -rf .buildozer
          yes | buildozer android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: My-Tetris-Game
          path: bin/*.apk
